<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, inital-scale=1.0"/>
    <title>Plant Disease Identifier</title>
<style>
    body{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #3a593f;
        color: #ffffff;
        text-align: center;
        align-content: center;
        padding: 40px;
    }
    h1{
        color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 2;
        text-align: center;
        align-content: center;
        margin-bottom: 8px;
    }
    .upload-card{
        background-color: #56825d;
        border: 2px dashed #609168;
        border-radius: 16px;
        padding: 40x;
        margin: 0 auto;
        text-align: center;
        cursor: pointer;
        width: 100%;
        max-width: 480px;
        margin-bottom: 24px;
    }
    .upload-card input[type="file"]{
        display: none;
    }
</style>
</head>
<body>
    <h1>Plant Disease Identifier</h1>
    <p>Upload an image of the file type PNG, JPG, or JPEG</p>

    <form id="prediction-form" action="/prediction" method="POST" enctype="multipart/form-data">

        <div class="upload-card" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" name="image" accept="image/png, image/jpg, image/jpeg"/>
            <label id = "file-label">Click to choose an image</label>
            <div id="preview-container">
                <img id="image-preview" src="#" alt="Image Preview"
                    style="display:none; max-width:300px; margin: 20px auto 20px auto;"/>
            </div>
        </div>
        <button type="submit">Identify Disease →</button>
    </form>

    <h1 id = "result-box"></h1>
</body>
</html>

<script>
    const form = document.getElementById('prediction-form');
    const result = document.getElementById('result-box');
    const fileInput = document.getElementById('file-input');
    const imagePreview = document.getElementById('image-preview');
    fileInput.addEventListener('change', function() {
    const iView = document.getElementById('imageView');
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        imagePreview.src = e.target.result;
        imagePreview.style.display = 'block';
      };
      reader.readAsDataURL(file);
      document.getElementById('file-label').textContent = file.name;
    }
  });

    form.addEventListener("submit", async function(event){
        event.preventDefault();
        const formData = new FormData(form);
        const response = await fetch("/prediction",{method:"POST", body:formData});
        const data = await response.json();
        if(data.error)
            result.textContent = data.error;
        else
            result.textContent = 'class: '+data.class+" confidence: "+data.confidence;
    });
</script>

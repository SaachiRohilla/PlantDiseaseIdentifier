<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, inital-scale=1.0"/>
    <title>Plant Disease Identifier</title>
<style>
    body{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #000000;
        color: #ffffff;
        text-align: center;
        align-content: center;
        padding: 40px;
    }
    h1{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 2;
        text-align: center;
        align-content: center;
        margin-bottom: 8px;
    }
    .upload-card{
        background-color: #52c2ff;
        border: 2px dashed #2654ed;
        border-radius: 16px;
        padding: 40x;
        text-align: center;
        cursor: pointer;
        transition: #2654ed 0.2s;
        width: 100%;
        max-width: 480px;
        margin-bottom: 24px;
    }
    .upload-card:hover{
        border-color: #82b6bd ;
    }
    .upload-card input[type="file"]{
        display: none;
    }
    .upload-card label{
        cursor: pointer;
        font-size: 1;
        color: #aaaaaa;
    }
</style>
</head>
<body>
    <h1>Plant Disease Identifier</h1>
    <p>Upload an image of the file type PNG, JPG, or JPEG</p>
</body>
</html>

<input type="file" id="file-input" accept="image/*">
<div id="preview-container">
  <img id="image-preview" src="#" alt="Image Preview" style="display:none; max-width: 200px;">
</div>

<script>
  const fileInput = document.getElementById('file-input');
  const imagePreview = document.getElementById('image-preview');

  fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        imagePreview.src = e.target.result;
        imagePreview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });
</script>
